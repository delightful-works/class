<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5학년 1학기: 랜덤 혼합계산 연습</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .btn-reset {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 25px;
            transition: background 0.2s;
        }
        .btn-reset:hover {
            background-color: #2980b9;
        }
        .quiz-item {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #edf2f7;
        }
        .question {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #2d3748;
        }
        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="number"] {
            width: 120px;
            padding: 10px;
            font-size: 18px;
            border: 2px solid #cbd5e0;
            border-radius: 6px;
            text-align: center;
        }
        input[type="number"]:focus {
            border-color: #3498db;
            outline: none;
        }
        .btn-check {
            padding: 10px 18px;
            background-color: #4a5568;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }
        .btn-check:hover {
            background-color: #2d3748;
        }
        .result {
            margin-left: 15px;
            font-weight: bold;
            font-size: 16px;
        }
        .correct { color: #38a169; }
        .incorrect { color: #e53e3e; }
        
        .score-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #e2e8f0;
        }
        .btn-total {
            padding: 12px 30px;
            background-color: #48bb78;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-total:hover {
            background-color: #38a169;
        }
        #total-score {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #2d3748;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✏️ 5학년 혼합 계산 연습 (랜덤 문제)</h1>
    <button class="btn-reset" onclick="generateQuiz()">🔄 새로운 문제 만들기</button>
    
    <div id="quiz-container">
        <!-- 자바스크립트로 문제가 여기에 생성됩니다 -->
    </div>

    <div class="score-section">
        <button class="btn-total" onclick="calculateTotal()">💯 최종 점수 확인</button>
        <div id="total-score"></div>
    </div>
</div>

<script>
    // 정답을 저장할 배열
    let correctAnswers = [];

    // 랜덤 정수 생성 함수
    function getRandom(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // 퀴즈 생성 함수
    function generateQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = ''; // 기존 문제 초기화
        document.getElementById('total-score').textContent = ''; // 점수 초기화
        correctAnswers = []; // 정답 배열 초기화

        // 총 5개의 난이도별/유형별 문제 생성
        const templates = [
            // 유형 1: 덧셈과 뺄셈 (쉬움)
            () => {
                let a = getRandom(20, 50);
                let b = getRandom(5, 15);
                let c = getRandom(5, 15);
                return { text: `${a} - ${b} + ${c}`, ans: a - b + c };
            },
            // 유형 2: 괄호가 있는 덧셈과 뺄셈
            () => {
                let a = getRandom(40, 60);
                let b = getRandom(10, 20);
                let c = getRandom(5, 15);
                return { text: `${a} - (${b} + ${c})`, ans: a - (b + c) };
            },
            // 유형 3: 곱셈과 나눗셈 (나누어 떨어지게 설정)
            () => {
                let b = getRandom(3, 8);
                let ans = getRandom(4, 9);
                let product = b * ans; // product ÷ b = ans 가 됨
                let a = getRandom(2, 5);
                // a * product ÷ b
                return { text: `${a} × ${product} ÷ ${b}`, ans: a * ans };
            },
            // 유형 4: 덧셈, 뺄셈, 곱셈/나눗셈 혼합
            () => {
                let a = getRandom(15, 30);
                let b = getRandom(2, 5);
                let c = getRandom(3, 6);
                return { text: `${a} + ${b} × ${c}`, ans: a + (b * c) };
            },
            // 유형 5: 괄호가 있고 사칙연산이 섞인 복합 문제 (너무 어렵지 않게)
            () => {
                let b = getRandom(2, 5);
                let share = getRandom(3, 6);
                let parenthesis = b * share; // 괄호 안의 결과가 이 값이 되도록
                let minus = getRandom(2, 5);
                let a = parenthesis + minus; // a - minus = parenthesis
                let start = getRandom(10, 20);
                
                // start + (a - minus) ÷ b
                return { text: `${start} + (${a} - ${minus}) ÷ ${b}`, ans: start + share };
            }
        ];

        templates.forEach((template, index) => {
            const quizData = template();
            correctAnswers.push(quizData.ans);

            const quizItem = document.createElement('div');
            quizItem.className = 'quiz-item';
            quizItem.innerHTML = `
                <div class="question">Q${index + 1}. &nbsp; ${quizData.text}</div>
                <div class="input-area">
                    <input type="number" id="q${index}" placeholder="정답">
                    <button class="btn-check" onclick="checkAnswer(${index})">확인</button>
                    <span id="res${index}" class="result"></span>
                </div>
            `;
            container.appendChild(quizItem);
        });
    }

    // 개별 문제 실시간 채점
    function checkAnswer(index) {
        const userAnswer = document.getElementById(`q${index}`).value;
        const resultSpan = document.getElementById(`res${index}`);
        
        if (userAnswer === "") {
            resultSpan.textContent = "답을 적어주세요!";
            resultSpan.className = "result incorrect";
            return;
        }

        if (parseInt(userAnswer) === correctAnswers[index]) {
            resultSpan.textContent = "⭕ 정답!";
            resultSpan.className = "result correct";
        } else {
            resultSpan.textContent = "❌ 다시 풀어봐요";
            resultSpan.className = "result incorrect";
        }
    }

    // 전체 결과 점수 계산
    function calculateTotal() {
        let score = 0;
        let allAnswered = true;

        for (let i = 0; i < correctAnswers.length; i++) {
            const userAnswer = document.getElementById(`q${i}`).value;
            if (userAnswer === "") {
                allAnswered = false;
            }
            if (parseInt(userAnswer) === correctAnswers[i]) {
                score += 20;
            }
        }

        const totalScoreDiv = document.getElementById('total-score');
        if (!allAnswered) {
            totalScoreDiv.innerHTML = "<span style='color:#e53e3e;'>아직 풀지 않은 문제가 있어요!</span>";
        } else {
            if (score === 100) {
                totalScoreDiv.innerHTML = `🎉 <strong>100점 만점!</strong> 완벽해요! 🎉`;
            } else {
                totalScoreDiv.innerHTML = `👍 <strong>${score}점</strong> 입니다. 틀린 문제를 다시 확인해 보세요!`;
            }
        }
    }

    // 페이지가 처음 열릴 때 자동으로 문제 생성
    window.onload = generateQuiz;
</script>

</body>
</html>
